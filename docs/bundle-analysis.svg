  <text x="96" y="416" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">SettingsPanel</text>
  <rect x="260" y="394" width="950" height="26" rx="13" fill="#1E293B"/>
  <rect x="260" y="394" width="12" height="26" rx="13" fill="#A855F7"/>
  <text x="292" y="414" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18">2.5 kB</text>

  <rect x="64" y="458" width="615" height="298" rx="20" fill="#162133" stroke="#23314B"/>
  <text x="96" y="502" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600">
    Main chunk contents
  </text>
  <text x="96" y="548" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">
    • React + React DOM runtime
  </text>
  <text x="96" y="586" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">
    • React Router and app bootstrap
  </text>
  <text x="96" y="624" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">
    • Chat provider, reducer, storage helpers
  </text>
  <text x="96" y="662" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">
    • API client and global routing shell
  </text>
  <text x="96" y="714" fill="#60A5FA" font-family="Inter, Arial, sans-serif" font-size="18">
    react-markdown is not bundled into the startup chunk.
  </text>

  <rect x="721" y="458" width="615" height="298" rx="20" fill="#162133" stroke="#23314B"/>
  <text x="753" y="502" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600">
    Lazy-loaded pieces
  </text>
  <text x="753" y="548" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">
    • AuthPage, HomePage, ChatPage route wrappers
  </text>
  <text x="753" y="586" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">
    • Sidebar chunk
  </text>
  <text x="753" y="624" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">
    • SettingsPanel chunk
  </text>
  <text x="753" y="662" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">
    • AppLayout chunk carries Message + react-markdown tree
  </text>
  <text x="753" y="714" fill="#22C55E" font-family="Inter, Arial, sans-serif" font-size="18">
    This keeps the initial route shell smaller and defers chat-heavy parsing code.
  </text>
